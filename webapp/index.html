<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Swagging Gift Premium</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="loading" class="screen">
            <div class="glow-circle"></div>
            <div class="loader"></div>
        </div>
        <p class="loading-text">Инициализация системы...</p>
    </div>

    <div id="app" class="hidden-init">
        <header class="glass-header">
            <div class="user-profile">
                <div class="avatar-glow" id="user-avatar">🎁</div>
                <div class="user-meta">
                    <h2 id="user-name">Игрок</h2>
                    <p id="user-rank">Новичок</p>
                </div>
            </div>
            <div class="stats-group">
                <div class="stat-item">
                    <span class="stat-label">🏆 ПОБЕД</span>
                    <span class="stat-value" id="wins-count">0</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">🎰 СПИНОВ</span>
                    <span class="stat-value" id="spins-count">0</span>
                </div>
            </div>
        </header>

        <main class="content">
            <!-- Case Slider (The "Roulette") -->
            <section class="roulette-container">
                <div class="roulette-glow"></div>
                <div class="roulette-marker"></div>
                <div class="slider-viewport">
                    <div id="slider" class="slider-track">
                        <!-- Items will be injected here -->
                    </div>
                </div>
            </section>

            <section class="main-actions">
                <button id="btn-spin" class="btn-premium spin-btn">
                    <div class="btn-content">
                        <span class="btn-text">ИСПЫТАТЬ УДАЧУ</span>
                        <span class="btn-price">15 ⭐</span>
                    </div>
                    <div class="btn-shine"></div>
                </button>
                <button id="btn-free" class="btn-glass free-btn">
                    <span>🎁 Бесплатный шанс</span>
                </button>
            </section>

            <section class="tabs-system">
                <nav class="tabs-nav">
                    <button class="nav-item active" data-tab="inventory">ПРИЗЫ</button>
                    <button class="nav-item" data-tab="top">ТОП</button>
                    <button class="nav-item" data-tab="history">LIVE</button>
                    <button class="nav-item hidden-init" data-tab="admin" id="admin-tab-btn">DEV</button>
                </nav>
                <div id="tab-content" class="tab-pane">
                    <!-- Dynamic Content -->
                </div>
            </section>
        </main>

        <div id="overlay" class="modal-overlay hidden-init">
            <div class="modal-content">
                <div id="result-glow" class="result-glow"></div>
                <div class="modal-header">ВЫИГРЫШ!</div>
                <div id="result-emoji" class="result-emoji">🎁</div>
                <div id="result-name" class="result-name">Название</div>
                <div id="result-rarity" class="result-rarity">РАРИТЕТНОСТЬ</div>
                <p class="result-note">Предмет успешно зачислен в ваш профиль.</p>
                <button class="btn-premium" onclick="closeOverlay()">ЗАБРАТЬ</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>

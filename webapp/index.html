<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Swagging Gift</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="loading" class="screen">
        <div class="loader"></div>
        <p>Загрузка...</p>
    </div>

    <div id="app" style="display: none;">
        <!-- Header / Balance -->
        <header class="main-header">
            <h1 class="logo">Swagging Gift</h1>
            <div id="user-stats" class="user-info">
                <span id="wins-count" class="stat-pill">🏆 0</span>
                <span id="spins-count" class="stat-pill">🎰 0</span>
            </div>
        </header>

        <!-- Main Screen -->
        <main id="screen-main" class="screen-content">
            <section class="wheel-section">
                <div class="wheel-container">
                    <div id="wheel" class="wheel">
                        <!-- Items injected here -->
                    </div>
                </div>
                <div class="wheel-indicator"></div>
            </section>

            <section class="actions">
                <button id="btn-spin" class="btn primary">
                    Крутить <span class="cost">15 ⭐</span>
                </button>
                <button id="btn-free" class="btn secondary">
                    🎁 Бесплатный спин
                </button>
            </section>

            <section class="tabs-container">
                <div class="tabs-header">
                    <button class="tab-btn active" onclick="showTab('inventory')">Инвентарь</button>
                    <button class="tab-btn" onclick="showTab('top')">Топ</button>
                    <button class="tab-btn" onclick="showTab('rules')">Шансы</button>
                </div>
                <div id="tab-content" class="tab-content">
                    <!-- Tab content injected here -->
                </div>
            </section>
        </main>

        <!-- Overlay / Animations -->
        <div id="win-overlay" class="overlay" style="display: none;">
            <div class="win-card">
                <div class="confetti"></div>
                <h2>Победа!</h2>
                <div id="win-emoji" class="win-emoji">🎁</div>
                <h3 id="win-name">Награда</h3>
                <p id="win-rarity">Раритетность</p>
                <div class="win-desc">Предмет добавлен в инвентарь или придёт подарком!</div>
                <button class="btn primary" onclick="closeOverlay()">Отлично!</button>
            </div>
        </div>

        <div id="lose-overlay" class="overlay" style="display: none;">
            <div class="lose-card">
                <h2>Пусто</h2>
                <div class="lose-emoji">💀</div>
                <p>Барабан не выдал приз. Попробуйте еще раз!</p>
                <button class="btn secondary" onclick="closeOverlay()">Понял</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
